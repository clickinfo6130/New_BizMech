<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PartManager 3D Viewer</title>
    <link rel="stylesheet" href="css/viewer.css">
    <script type="importmap">
    {
        "imports": {
            "three": "./js/lib/three.module.js",
            "three/addons/": "./js/lib/addons/"
        }
    }
    </script>
</head>
<body>
    <div id="viewer-container"></div>
    <!-- view-indicator는 WPF 컨트롤바에서 관리 (WebView2 환경) -->
    <div id="view-indicator" style="display:none;">ISO</div>
    <!-- ★ 치수 참조 패널 (약어 ↔ 전체명 매핑) — JS에서 동적 생성/제어 -->
    <div id="dim-panel" style="display:none;">
        <div class="dim-panel-header">
            <span class="dim-panel-title">📏 치수 정보</span>
            <span class="dim-panel-count"></span>
        </div>
        <div class="dim-panel-body"></div>
    </div>
    <!-- BizMech web: postMessage bridge MUST load before the renderer module. -->
    <script src="js/bridge.js"></script>
    <script type="module" src="js/partRenderer.js"></script>
</body>
</html>
